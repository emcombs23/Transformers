<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformers - Vocabulary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Vocabulary</h1>
    <div id="encode-panel">
        <input id="encode-input" type="text" placeholder="Type a string to embed" />
        <button id="encode-button">Embed</button>
    </div>
    <div id="encode-result"></div>
    <div id="vocab-container"></div>
    <div id="plot-container">
        <div class="plot-box">
            <h2>Vocab Embeddings (2D)</h2>
            <canvas id="embedding-plot"></canvas>
        </div>
        <div class="plot-box">
            <h2>Position Embeddings (2D)</h2>
            <canvas id="position-plot"></canvas>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
